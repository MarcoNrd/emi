<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>MyELGA</title>
</head>
<body>
    <div class="container">
        <h1>MyELGA</h1>
        <form class="form-container">
            <div class="form-group">
                <label for="svn">SVN:</label>
                <input type="number" id="svn" name="svn" placeholder="z. B. 1234567890">
            </div>
            <div class="form-group">
                <label for="vorname">Vorname:</label>
                <input type="text" id="vorname" name="vorname" placeholder="Max">
            </div>
            <div class="form-group">
                <label for="nachname">Nachname:</label>
                <input type="text" id="nachname" name="nachname" placeholder="Mustermann">
            </div>
            <input type="submit" value="Speichern" class="submit-btn">
        </form>
    </div>
</body>
</html>
